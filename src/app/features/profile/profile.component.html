<div class="min-h-screen bg-gray-50/50 dark:bg-gray-900">
  <app-page-header
    [title]="'profilePage.pageTitle' | translate"
    [description]="'profilePage.pageDescription' | translate"
    [breadcrumbs]="[{ label: ('profilePage.breadcrumb' | translate) }]"
    [iconClass]="'fa-solid fa-user'"
  >
  </app-page-header>

  <div class="container px-4 py-8">
    <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
      <aside class="w-full lg:w-72 shrink-0">
        <nav class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm overflow-hidden">
          <div class="p-4 border-b border-gray-100 dark:border-gray-700">
            <h2 class="font-bold text-gray-900 dark:text-white">{{ 'profilePage.sidebarTitle' | translate }}</h2>
          </div>

          <ul class="p-2 space-y-1">
            <li>
              <a
                routerLink="settings"
                #rlaSettings="routerLinkActive"
                routerLinkActive
                class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group text-gray-600 dark:text-gray-300"
                [class.bg-primary-50]="rlaSettings.isActive"
                [class.dark:bg-primary-900/30]="rlaSettings.isActive"
                [class.text-primary-700]="rlaSettings.isActive"
                [class.hover:bg-gray-50]="!rlaSettings.isActive"
                [class.dark:hover:bg-gray-700]="!rlaSettings.isActive"
                [class.hover:text-gray-900]="!rlaSettings.isActive"
                [class.dark:hover:text-white]="!rlaSettings.isActive"
              >
                <div
                  class="w-9 h-9 rounded-lg flex items-center justify-center transition-colors"
                  [class.bg-primary-500]="rlaSettings.isActive"
                  [class.text-white]="rlaSettings.isActive"
                  [class.bg-gray-100]="!rlaSettings.isActive"
                  [class.dark:bg-gray-700]="!rlaSettings.isActive"
                  [class.text-gray-500]="!rlaSettings.isActive"
                  [class.dark:text-gray-400]="!rlaSettings.isActive"
                  [class.group-hover:bg-gray-200]="!rlaSettings.isActive"
                  [class.dark:group-hover:bg-gray-600]="!rlaSettings.isActive"
                >
                  <i class="fa-solid fa-gear text-sm"></i>
                </div>

                <span class="font-medium flex-1">{{ 'profilePage.settings' | translate }}</span>

                <i
                  class="fa-solid fa-chevron-right text-sm transition-transform rtl:rotate-180"
                  [class.text-primary-500]="rlaSettings.isActive"
                  [class.text-gray-400]="!rlaSettings.isActive"
                ></i>
              </a>
            </li>
          </ul>
        </nav>
      </aside>
      <div class="flex-1 min-w-0">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
