<div class="text-center" [class]="containerClass()">
  <div class="flex items-center justify-center mx-auto mb-5" [class]="iconWrapperClass()">
    <i [class]="iconClass()"></i>
  </div>

  <h3 class="font-bold text-gray-900 dark:text-gray-100 mb-2" [class]="titleClass()">
    {{ title() }}
  </h3>

  <p class="text-gray-500 dark:text-gray-400 font-medium" [class]="descClass()">
    {{ desc() }}
  </p>

  <ng-content></ng-content>
</div>
